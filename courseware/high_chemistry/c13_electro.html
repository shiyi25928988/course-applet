<h1>⚡ 第六章 电化学基础</h1>
<div class="formula-box">
<h3>🎯 核心原理</h3>
<p><strong>原电池：</strong>负极氧化反应，正极还原反应，电子由负极→外电路→正极</p>
<p><strong>电解池：</strong>阳极氧化反应，阴极还原反应，由外接电源驱动</p>
<p><strong>金属防护：</strong>牺牲阳极法、外加电流阴极保护法</p>
</div>
<h2 style="margin:24px 0 12px;">🔬 铜锌原电池装置图</h2>
<div class="anim-box">

<h2 style="margin:24px 0 12px;">✏️ 典型例题</h2>
<div class="question">
<span class="q-num">例1</span>铜锌原电池工作时，下列叙述正确的是（ ）
<div class="options"><label><input type="radio" name="q1" value="A">A. 正极反应为 Zn - 2e⁻ = Zn²⁺</label><label><input type="radio" name="q1" value="B">B. 电池反应为 Zn + Cu²⁺ = Zn²⁺ + Cu</label><label><input type="radio" name="q1" value="C">C. 在外电路中，电子从铜极流向锌极</label><label><input type="radio" name="q1" value="D">D. 盐桥中的 K⁺ 移向 ZnSO₄ 溶液</label></div>
<button class="answer-btn" onclick="showAnswer(1)">查看解析</button>
<div class="answer" id="answer-1" data-correct="B">✅ B。A是负极反应；C电子从Zn→Cu；DK⁺移向正极区CuSO₄溶液。</div>
