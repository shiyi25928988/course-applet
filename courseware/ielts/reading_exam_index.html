        function renderExamList(filter = 'all') {
            const container = document.getElementById('exam-list');
            let filteredExams = exams;
            
            if (filter === 'completed') {
                filteredExams = exams.filter(e => e.status === 'completed');
            } else if (['easy', 'medium', 'hard'].includes(filter)) {
                filteredExams = exams.filter(e => e.difficulty === filter);
            } else if (filter !== 'all') {
                filteredExams = exams.filter(e => e.types.some(t => t.includes(filter)));
            }
            
            container.innerHTML = filteredExams.map(exam => {
                const difficultyLabel = exam.difficulty === 'easy' ? '⭐ 简单' : exam.difficulty === 'medium' ? '⭐⭐ 中等' : '⭐⭐⭐ 困难';
                const difficultyColor = exam.difficulty === 'easy' ? '#10b981' : exam.difficulty === 'medium' ? '#f59e0b' : '#ef4444';
                const statusBadge = exam.status === 'completed' 
                    ? '<span class="status-badge completed">✅ 已完成</span>'
                    : '<span class="status-badge pending">🚧 整理中</span>';
                
                return `
                <a href="${exam.file}" class="exam-card ${exam.status === 'completed' ? 'completed' : ''}">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                        <div>
                            <h4>${exam.id}. ${exam.title}</h4>
                            <div class="meta">
                                <span>${exam.source}</span>
                                ${statusBadge}
                            </div>
                            <div class="meta">
                                ${exam.topics.map(t => `<span style="background:#fef3c7;color:#b45309;">${t}</span>`).join('')}
                            </div>
                            <p>题型：${exam.types.join(' · ')}</p>
                        </div>
                        <div style="color:${difficultyColor};font-weight:500;">
                            ${difficultyLabel}
                        </div>
                    </div>
                </a>
                `;
            }).join('');
        }

        function filterExams(type) {
            document.querySelectorAll('.filter-bar button').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`button[data-filter="${type}"]`).classList.add('active');
            renderExamList(type);
        }

        // 绑定筛选按钮事件
        document.querySelectorAll('#filterButtons button').forEach(btn => {
            btn.addEventListener('click', function() {
                filterExams(this.getAttribute('data-filter'));
            });
        });

        renderExamList('all');
    </script>
