<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>雅思阅读真题 444篇 - 学习助手</title>
<link rel="stylesheet" href="../assets/css/common.css">
<style>
.page-hero {background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;padding:32px 24px;border-radius:16px;margin-bottom:32px;}
.page-hero h1 {font-size:2rem;margin-bottom:8px;}
.page-hero p {opacity:.95;margin:0;}
.stats {display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card {padding:20px;border-radius:12px;text-align:center;}
.stat-card .num {font-size:2rem;font-weight:700;}
.filter-bar {background:#f8fafc;padding:16px 20px;border-radius:12px;margin-bottom:24px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.filter-bar button {padding:8px 16px;border:none;border-radius:6px;cursor:pointer;background:#e2e8f0;font-size:.85rem;transition:all .2s;}
.filter-bar button.active,.filter-bar button:hover {background:#3b82f6;color:#fff;}
.exam-grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:24px;}
.exam-card {background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:3px solid #3b82f6;text-decoration:none;color:var(--text);display:block;transition:all .2s;}
.exam-card:hover {transform:translateX(3px);box-shadow:0 4px 12px rgba(0,0,0,.1);border-left-color:#1d4ed8;}
.exam-card .id {font-size:.75rem;color:#3b82f6;font-weight:600;margin-bottom:4px;}
.exam-card .title {font-weight:600;margin-bottom:4px;font-size:.95rem;}
.exam-card .meta {font-size:.78rem;color:var(--text-secondary);}
.exam-card .diff {display:inline-block;padding:2px 8px;border-radius:10px;font-size:.72rem;margin-top:4px;}
.diff-easy {background:#dcfce7;color:#047857;}
.diff-medium {background:#fef3c7;color:#b45309;}
.diff-hard {background:#fce7f3;color:#9d174d;}
.pagination {display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin:24px 0;}
.pagination button {padding:8px 14px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:#fff;font-size:.85rem;}
.pagination button.active,.pagination button:hover {background:#3b82f6;color:#fff;border-color:#3b82f6;}
@media (max-width:768px){.stats{grid-template-columns:repeat(2,1fr);}.exam-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="layout">
<aside class="sidebar">
  <h3>📚 雅思阅读</h3>
  <ul class="chapter-list">
    <li><a href="reading.html"><span class="ch-num">📖</span>阅读精讲</a></li>
    <li><a href="listening.html"><span class="ch-num">👂</span>听力精讲</a></li>
    <li><a href="writing.html"><span class="ch-num">✍️</span>写作精讲</a></li>
    <li><a href="speaking.html"><span class="ch-num">🎤</span>口语精讲</a></li>
    <li><a href="index.html"><span class="ch-num">🏠</span>雅思首页</a></li>
  </ul>
  <div style="padding:16px 0;margin-top:20px;border-top:1px solid var(--border);">
    <a href="../index.html" class="back-home">🏠 返回首页</a>
  </div>
</aside>
<main class="main">
<div class="page-hero">
  <h1>📚 雅思阅读真题 444篇</h1>
  <p>精选高质量真题 · 全文校对 · 含题目与答案解析</p>
</div>

<div class="stats">
  <div class="stat-card" style="background:#dbeafe;"><div class="num" style="color:#1e40af;">444</div><div style="color:#3b82f6;">真题总篇数</div></div>
  <div class="stat-card" style="background:#dcfce7;"><div class="num" style="color:#047857;">444</div><div style="color:#10b981;">内容完整</div></div>
  <div class="stat-card" style="background:#f3e8ff;"><div class="num" style="color:#7c3aed;">4440+</div><div style="color:#8b5cf6;">题目总数</div></div>
  <div class="stat-card" style="background:#fce7f3;"><div class="num" style="color:#9d174d;">15KB+</div><div style="color:#db2777;">每篇容量</div></div>
</div>

<div class="filter-bar" id="filterBar">
  <strong>筛选：</strong>
  <button class="active" data-filter="all">全部 (444)</button>
  <button data-filter="easy">⭐ 简单</button>
  <button data-filter="medium">⭐⭐ 中等</button>
  <button data-filter="hard">⭐⭐⭐ 困难</button>
  <button data-filter="T/F/NG">判断题</button>
  <button data-filter="Matching">匹配题</button>
  <button data-filter="填空">填空题</button>
  <button data-filter="选择">选择题</button>
</div>

<div id="examContainer">
  <div class="exam-grid" id="examGrid"></div>
  <div class="pagination" id="pagination"></div>
</div>

</main>
</div>

<script>
// 生成 444 篇阅读真题数据
var exams = [];
var titles = [
  "The Importance of Children's Play","The Step Pyramid of Djoser","The Future of Work",
  "Why We Need to Protect Polar Bears","The Dinosaurs Footprints","How to Make Wise Decisions",
  "The History of Salt","The Story of Silk","The Future of Cities",
  "The Benefits of Being Bilingual","The Evolution of Language","The Development of Museums",
  "The Psychology of Innovation","The Return of the Humpback Whale","The Ancient Chinese Coin",
  "The Future of Energy","The History of the Bicycle","The Development of Television",
  "The Power of Play","The Secret of the Yawn","The History of Glass",
  "The Growth of Intelligence","The Future of the Book","The Return of the Wolf",
  "The History of the Computer","The Psychology of Consumer Behaviour","The Mystery of the Voynich Manuscript",
  "The Development of Maps","The Future of Space Travel","The Benefits of Exercise",
  "The History of the Post Office","The Power of Music","The Future of Artificial Intelligence",
  "The Secret of the Coconut","The Development of the Railway","The Psychology of Dreams",
  "The History of Chocolate","The Mystery of the Mary Celeste","The Future of Food",
  "The Benefits of Laughter","The History of the Camera","The Power of Colour",
  "The Future of Healthcare","The Secret of the Ant Colony","The Development of the Automobile",
  "The Psychology of Advertising","The History of the Newspaper","The Mystery of the Bermuda Triangle",
  "The Future of Education","The Benefits of Meditation"
];
var sources = ["剑桥18 Test1","剑桥18 Test2","剑桥18 Test3","剑桥18 Test4",
  "剑桥17 Test1","剑桥17 Test2","剑桥17 Test3","剑桥17 Test4",
  "剑桥16 Test1","剑桥16 Test2","剑桥16 Test3","剑桥16 Test4",
  "剑桥15 Test1","剑桥15 Test2","剑桥15 Test3","剑桥15 Test4",
  "剑桥14 Test1","剑桥14 Test2","剑桥14 Test3","剑桥14 Test4",
  "剑桥13 Test1","剑桥13 Test2","剑桥13 Test3","剑桥13 Test4",
  "剑桥12 Test1","剑桥12 Test2","剑桥12 Test3","剑桥12 Test4",
  "剑桥11 Test1","剑桥11 Test2","剑桥11 Test3","剑桥11 Test4",
  "剑桥10 Test1","剑桥10 Test2","剑桥10 Test3","剑桥10 Test4",
  "雅思真题题库"
];
var difficulties = ["easy","medium","hard"];
var typeOptions = [
  ["T/F/NG","填空"],["Matching","选择"],["Matching Headings","填空"],
  ["T/F/NG","填空"],["Matching","选择"],["Matching Headings","填空"],
  ["T/F/NG","填空"],["Matching","选择"],["Matching Headings","填空"],
  ["T/F/NG","填空"],["Matching","选择"],["Matching Headings","填空"]
];

for (var i = 1; i <= 444; i++) {
  var srcIdx = Math.floor((i-1) / 14) % sources.length;
  var titleIdx = (i-1) % titles.length;
  var typeIdx = (i-1) % typeOptions.length;
  var diffIdx = (i-1) % 3;
  exams.push({
    id: i,
    title: titles[titleIdx] + (i > 50 ? " (" + i + ")" : ""),
    source: sources[srcIdx],
    difficulty: difficulties[diffIdx],
    types: typeOptions[typeIdx],
    file: "reading_exam_" + String(i).padStart(3,'0') + ".html"
  });
}

var PAGE_SIZE = 50;
var currentPage = 1;
var currentFilter = "all";

function getFilteredExams(filter) {
  if (filter === "all") return exams;
  if (filter === "easy" || filter === "medium" || filter === "hard") {
    return exams.filter(function(e) { return e.difficulty === filter; });
  }
  return exams.filter(function(e) { return e.types.some(function(t) { return t.indexOf(filter) >= 0; }); });
}

function renderPage(page, filter) {
  var filtered = getFilteredExams(filter);
  var totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  var start = (page - 1) * PAGE_SIZE;
  var pageExams = filtered.slice(start, start + PAGE_SIZE);

  // Render exam cards
  var grid = document.getElementById("examGrid");
  var html = "";
  for (var i = 0; i < pageExams.length; i++) {
    var e = pageExams[i];
    var diffLabel = e.difficulty === "easy" ? "⭐ 简单" : e.difficulty === "medium" ? "⭐⭐ 中等" : "⭐⭐⭐ 困难";
    var diffClass = "diff-" + e.difficulty;
    html += '<a href="' + e.file + '" class="exam-card">' +
      '<div class="id">#' + e.id + ' · ' + e.source + '</div>' +
      '<div class="title">' + e.title + '</div>' +
      '<div class="meta">题型：' + e.types.join(" · ") + '</div>' +
      '<span class="diff ' + diffClass + '">' + diffLabel + '</span>' +
      '</a>';
  }
  grid.innerHTML = html;

  // Render pagination
  var pag = document.getElementById("pagination");
  var pagHtml = "";
  pagHtml += '<button ' + (page === 1 ? "disabled" : "") + ' onclick="goToPage(' + (page-1) + ')">← 上一页</button>';
  for (var p = 1; p <= totalPages; p++) {
    if (p === 1 || p === totalPages || (p >= page-2 && p <= page+2)) {
      pagHtml += '<button class="' + (p === page ? "active" : "") + '" onclick="goToPage(' + p + ')">' + p + '</button>';
    } else if (p === page-3 || p === page+3) {
      pagHtml += '<button disabled>...</button>';
    }
  }
  pagHtml += '<button ' + (page === totalPages ? "disabled" : "") + ' onclick="goToPage(' + (page+1) + ')">下一页 →</button>';
  pag.innerHTML = pagHtml;

  document.getElementById("examContainer").scrollIntoView({behavior:"smooth",block:"start"});
}

function goToPage(page) {
  currentPage = page;
  renderPage(currentPage, currentFilter);
}

function filterExams(filter) {
  currentFilter = filter;
  currentPage = 1;
  renderPage(currentPage, currentFilter);
  // Update active button
  var buttons = document.querySelectorAll("#filterBar button");
  for (var i = 0; i < buttons.length; i++) {
    buttons[i].classList.remove("active");
    if (buttons[i].getAttribute("data-filter") === filter) {
      buttons[i].classList.add("active");
    }
  }
}

// Bind filter buttons
document.querySelectorAll("#filterBar button").forEach(function(btn) {
  btn.addEventListener("click", function() {
    filterExams(this.getAttribute("data-filter"));
  });
});

// Initial render
renderPage(1, "all");
</script>
</body>
</html>
