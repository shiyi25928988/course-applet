<div class="question-title">1. 属于纯净物的是（ ）</div>
<div class="options">
<div class="option">A. 矿泉水</div>
<div class="option">B. 蒸馏水</div>
<div class="option">C. 自来水</div>
<div class="option">D. 汽水</div>
</div>
<div class="answer-box">
<div class="answer-title">答案：B</div>
<div>解析：蒸馏水是由一种物质组成的，属于纯净物。</div>
</div>

<div class="question-title">21. 化学与生活密切相关。请回答：</div>
<div style="margin:12px 0; line-height:2;">
(1) 青少年缺 <strong>钙</strong> 会患佝偻病和发育不良。<br>
